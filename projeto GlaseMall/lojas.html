<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>Lojas - Glaser Mall</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="style.css"/>

  <style>
    /* só pra deixar no padrão do admin sem mexer no style.css agora */
    .lojas-contatos {max-width:1100px;margin:24px auto;padding:0 20px}
    .loja-card{
      background:#fff;
      border:1px solid #d6dee6;
      border-radius:14px;
      padding:16px;
      box-shadow:0 6px 18px rgba(180,0,0,.06);
      display:flex;
      gap:16px;
      align-items:flex-start;
    }
    .loja-card + .loja-card{margin-top:14px}
    .loja-logo-box{
      width:86px;height:86px;
      border-radius:12px;
      border:1px solid #eef2f6;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
      background:#f7fafc;
      flex:0 0 auto;
    }
    .loja-logo-box img{width:100%;height:100%;object-fit:contain}
    .loja-info{flex:1}
    .loja-info h3{margin:0 0 4px}
    .loja-meta{color:var(--muted);margin:0 0 10px}
    .loja-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .btn-wa{
      display:inline-flex;align-items:center;gap:8px;
      background:#25D366;color:#fff;
      padding:8px 12px;border-radius:10px;
      text-decoration:none;font-weight:800;
    }
    .btn-ig{
      display:inline-flex;align-items:center;gap:8px;
      text-decoration:none;font-weight:800;
      color:var(--blue-600);
      padding:8px 10px;border-radius:10px;
      background:#fff6f6;border:1px solid #ffd2d2;
    }
    .loja-horario{margin-top:10px;color:var(--muted);font-size:.95rem}
    .btn-pagina{
      display:inline-flex;align-items:center;justify-content:center;
      padding:8px 12px;border-radius:10px;
      text-decoration:none;font-weight:800;
      background:var(--blue-600);color:#fff;
    }
  </style>
</head>

<body>
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <img src="images/logo.png" class="logo" alt="Glaser Mall">
      <div class="brand-text">
        <h1>Glaser Mall</h1>
        <span class="tag">Mais perto de você</span>
      </div>
    </div>

    <button id="hamburger" class="hamburger" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav" id="nav">
      <a href="index.html">Início</a>
      <a href="lojas.html">Lojas</a>
      <a href="servicos.html">Serviços</a>
      <a href="contato.html">Contato</a>
      <a href="administracao.html">Admin</a>
    </nav>
  </div>
</header>

<main>
  <section class="destaque">
    <h2>Lojas</h2>
    <p style="text-align:center;color:var(--muted);margin-top:6px">
    </p>
  </section>

  <section class="lojas-contatos">
    <div id="listaLojas"></div>
  </section>
</main>

<footer class="footer">
  <div class="footer-inner">
    <p>© 2025 Glaser Mall</p>
  </div>
</footer>

<script src="js/site.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/lojas.js"></script>

</body>
</html>
